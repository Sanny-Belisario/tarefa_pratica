<script>
    let imoveis=[]
    do{
        let imovel={area:"",tipo:"",endereço:""}
        imovel.area=prompt("Informe a area:","")
        imovel.tipo=prompt("Informe o tipo:","")
        imovel.endereço=prompt("Informe o endereço:","")
        imoveis.push(imovel)
    }while(confirm("Deseja adicionar novo imovel?"))
    for(i=0;i<imoveis.length;i++)
    {
        let imovel=imoveis[i]
        console.log(imovel.tipo+" com "+imovel.area+", localizada na "+imovel.endereço)
    }
</script>
